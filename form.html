<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote Work Café Finder | Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/css/base.css" />
    <link rel="stylesheet" href="./src/css/typography.css" />
    <link rel="stylesheet" href="./src/css/layout.css" />
    <link rel="stylesheet" href="./src/css/appearance.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h1><i class="title-xl accent-color">Remote Work Café Finder</i></h1>
        <nav>
          <ul>
            <li><a href="./index.html" class="nav-link text-lg">Home</a></li>
            <li>
              <a href="./gallery.html" class="nav-link text-lg">Gallery</a>
            </li>
            <li>
              <a href="#" class="nav-link nav-link-active text-lg">
                Suggest a café
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <div class="container">
        <h2 class="title-lg accent-color">
          Suggest a Café | Share Your Favorite
        </h2>
        <section class="section">
          <div class="form-header flex-wrap">
            <h3 class="title-md primary-color">Add Your Local Gem</h3>
            <p id="success-message"></p>
          </div>
          <form id="cafe-form" class="form" novalidate>
            <div class="form-group">
              <label for="cafe-name" class="text-cursive accent-color">
                Café Name
              </label>
              <input
                type="text"
                id="cafe-name"
                name="cafeName"
                placeholder="Cafe Name..."
                class="text-field"
                required
              />
              <div id="cafe-name-error" aria-live="polite"></div>
            </div>
            <div class="form-group">
              <label for="cafe-location" class="text-cursive accent-color">
                Location
              </label>
              <input
                type="text"
                id="cafe-location"
                name="cafeLocation"
                class="text-field"
                placeholder="Cafe Location..."
                required
              />
              <div id="cafe-location-error" aria-live="polite"></div>
            </div>
            <div class="form-group">
              <label for="cafe-vibe" class="text-cursive accent-color">
                Vibe
              </label>
              <textarea
                id="cafe-vibe"
                name="cafeVibe"
                placeholder="Describe the Vibe of the Café..."
                class="text-field"
                required
              ></textarea>
              <div id="cafe-vibe-error" aria-live="polite"></div>
            </div>
            <div class="form-group">
              <label for="cafe-features" class="text-cursive accent-color">
                Features
              </label>
              <select
                id="cafe-features"
                name="cafeFeatures"
                class="text-field"
                multiple
              >
                <option value="wifi">Wi-Fi</option>
                <option value="quiet">Quiet Atmosphere</option>
                <option value="cozy">Cozy Environment</option>
                <option value="outlets">Power Outlets</option>
                <option value="dog-friendly">Dog Friendly</option>
                <option value="coffee-and-beer">Coffee and Beer</option>
                <option value="spacious">Spacious</option>
              </select>
              <div id="cafe-features-error" aria-live="polite"></div>
            </div>
            <div class="form-buttons">
              <button type="submit" class="button button-primary">
                Submit
              </button>
              <button type="reset" class="button button-secondary">
                Reset
              </button>
            </div>
          </form>
        </section>
      </div>
    </main>
    <footer>
      <p>
        <i class="text-sm">
          &copy; 2026 Remote Work Café Finder. All rights reserved.
        </i>
      </p>
    </footer>

    <script src="./src/js/form-validation.js"></script>
    <script src="./src/js/index.js"></script>
  </body>
</html>
