<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote Work Café Finder | Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/css/base.css" />
    <link rel="stylesheet" href="./src/css/typography.css" />
    <link rel="stylesheet" href="./src/css/layout.css" />
    <link rel="stylesheet" href="./src/css/appearance.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h1><i class="title-xl accent-color">Remote Work Café Finder</i></h1>
        <nav>
          <ul>
            <li><a href="./index.html" class="nav-link text-lg">Home</a></li>
            <li>
              <a href="#" class="nav-link nav-link-active text-lg">Gallery</a>
            </li>
            <li>
              <a href="./form.html" class="nav-link text-lg">Suggest a café</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <div class="container">
        <h2 class="title-lg accent-color">
          Café Gallery | Find Your Perfect Remote Work Vibe
        </h2>
        <section class="section">
          <h3 class="title-md primary-color">Pick Your Next Favorite</h3>
          <div class="gallery-controls">
            <div class="flex-wrap">
              <label for="search-input" class="text-cursive accent-color">
                Search
              </label>
              <div class="flex-wrap">
                <input
                  type="text"
                  id="search-input"
                  class="text-field"
                  placeholder="Name, Vibe, or Neighbourhood"
                />
                <button
                  type="button"
                  id="clear-search"
                  class="button button-secondary"
                >
                  Clear
                </button>
              </div>
            </div>
            <div id="weather-info" class="flex-wrap">
              <p class="text-cursive accent-color">Loading weather data...</p>
            </div>
          </div>
          <div id="gallery" class="gallery"></div>
        </section>
      </div>
    </main>
    <footer>
      <p>
        <i class="text-sm">
          &copy; 2026 Remote Work Café Finder. All rights reserved.
        </i>
      </p>
    </footer>

    <script src="./src/js/data.js"></script>
    <script src="./src/js/index.js"></script>
    <script src="./src/api/weather-endpoint.js"></script>
    <script src="./src/js/weather-codes.js"></script>
    <script src="./src/js/weather.js"></script>
  </body>
</html>
